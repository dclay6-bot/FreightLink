<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <!-- Background -->
  <rect width="800" height="400" rx="24" fill="#0F1B2D"/>
  <rect x="0" y="370" width="800" height="30" rx="0" fill="#F59E0B"/>
  
  <!-- Icon -->
  <g transform="translate(60, 120)">
    <rect x="0" y="45" width="80" height="6" rx="3" fill="#F59E0B"/>
    <rect x="0" y="75" width="80" height="6" rx="3" fill="#F59E0B"/>
    <circle cx="40" cy="18" r="10" stroke="#F59E0B" stroke-width="4" fill="none"/>
    <circle cx="40" cy="108" r="10" stroke="#F59E0B" stroke-width="4" fill="none"/>
    <rect x="36" y="26" width="8" height="74" rx="4" fill="#F59E0B"/>
    <polygon points="70,58 85,46 85,70" fill="#F59E0B"/>
  </g>
  
  <!-- Brand name -->
  <text x="170" y="200" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="52" fill="#FFFFFF">FreightLink</text>
  <text x="170" y="245" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="22" fill="#94A3B8">Direct. Reliable. Connected.</text>
  
  <!-- Share badge -->
  <g transform="translate(560, 150)">
    <rect width="180" height="60" rx="30" fill="#F59E0B"/>
    <text x="90" y="38" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="18" fill="#0F1B2D" text-anchor="middle">Share &amp; Earn</text>
  </g>
</svg>
